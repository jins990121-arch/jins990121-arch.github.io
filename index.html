<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的故事 · 璐敏嫁给我好吗？</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: #faf8f5;
            color: #4a4a4a;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        /* 💌 仪式感爆棚的“开启信封”遮罩层 */
        #welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffe3e3 0%, #ffcbd7 100%);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s ease;
            text-align: center;
            padding: 20px;
        }
        .envelope-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(216, 90, 127, 0.2);
            max-width: 450px;
            width: 100%;
            border: 2px dashed #d85a7f;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .envelope-text {
            font-size: 1.4rem;
            color: #d85a7f;
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 1px;
            line-height: 1.6;
        }
        .open-btn {
            background-color: #d85a7f;
            color: white;
            padding: 12px 40px;
            border-radius: 25px;
            font-size: 1.1rem;
            box-shadow: 0 5px 15px rgba(216, 90, 127, 0.4);
            font-weight: bold;
        }

        /* 背景音乐控制按钮 */
        .music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-size: 20px;
            animation: rotate 4s linear infinite;
            animation-play-state: paused;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        /* 满屏区块通用样式 */
        .section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            text-align: center;
        }
        .hero-section {
            background: linear-gradient(135deg, #ffe3e3 0%, #ffffff 100%);
        }
        .hero-title {
            font-size: 2.5rem;
            color: #d85a7fff;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .hero-subtitle {
            font-size: 1.2rem;
            color: #7d7d7d;
            margin-bottom: 40px;
        }
        .scroll-hint {
            position: absolute;
            bottom: 30px;
            font-size: 0.9rem;
            color: #b5b5b5;
            animation: bounce 2s infinite;
            cursor: pointer;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        .timer-section {
            background-color: #ffffff;
        }
        .section-title {
            font-size: 2rem;
            color: #d85a7f;
            margin-bottom: 40px;
            position: relative;
        }
        .section-title::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background: #d85a7f;
            margin: 10px auto 0;
            border-radius: 2px;
        }
        .timer-container {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .time-box {
            background: #fff0f3;
            padding: 20px;
            border-radius: 12px;
            min-width: 80px;
            box-shadow: 0 4px 6px rgba(216, 90, 127, 0.1);
        }
        .time-num {
            font-size: 2rem;
            font-weight: bold;
            color: #d85a7f;
            display: block;
        }
        .time-unit {
            font-size: 0.85rem;
            color: #8c8c8c;
        }
        .timeline-section {
            background-color: #faf8f5;
            width: 100%;
        }
        .timeline {
            position: relative;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px 0;
            text-align: left;
        }
        .timeline::after {
            content: '';
            position: absolute;
            width: 2px;
            background-color: #ffe3e3;
            top: 0;
            bottom: 0;
            left: 20px;
        }
        .timeline-item {
            padding: 10px 30px;
            position: relative;
            background-color: inherit;
            margin-bottom: 30px;
        }
        .timeline-item::after {
            content: '❤';
            position: absolute;
            width: 20px;
            height: 20px;
            left: 12px;
            top: 13px;
            background-color: #faf8f5;
            color: #d85a7f;
            font-size: 14px;
            text-align: center;
            line-height: 20px;
            z-index: 1;
        }
        .timeline-content {
            padding: 20px;
            background-color: white;
            position: relative;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .timeline-date {
            font-weight: bold;
            color: #d85a7f;
            margin-bottom: 8px;
        }

            width: 100%;

            flex-wrap: wrap;

            margin: 30px auto;
            padding: 0 20px;

            max-width: 260px;
            width: 100%;
            border: 1px solid #f0f0f0;
        }
        .photo-item:hover {
            transform: rotate(0deg) scale(1.08);
            box-shadow: 0 12px 30px rgba(216, 90, 127, 0.25);
            z-index: 10;
        }
        .photo-item img {
            width: 100%;
            height: auto;
            border-radius: 2px;
            display: block;
        }
        .photo-caption {
            margin-top: 15px;
            font-size: 0.95rem;
            color: #555;
            font-family: '楷体', 'STKaiti', serif;
            font-weight: bold;
        }

        .proposal-section {
            background: linear-gradient(135deg, #ffffff 0%, #ffe3e3 100%);
        }
        .proposal-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(216, 90, 127, 0.15);
            max-width: 500px;
            width: 90%;
        }
        .btn-group {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            height: 60px;
            position: relative;
        }
        .btn {
            padding: 12px 35px;
            font-size: 1.1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }
        .btn-yes {
            background-color: #d85a7f;
            color: white;
            box-shadow: 0 5px 15px rgba(216, 90, 127, 0.3);
        }
        .btn-yes:hover {
            transform: scale(1.05);
            background-color: #c44d6f;
        }
        .btn-no {
            background-color: #e0e0e0;
            color: #666;
            position: relative;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
